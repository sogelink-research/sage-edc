###############################################################################
# GitLab CI/CD — Deploy PSNC EDC MVDS to Kubernetes
#
# This pipeline clones the psnc-edc-mvds repository and uses its Kubernetes
# deployment instructions (Ansible playbooks + scripts) to deploy the full
# EDC connector stack to your cluster.
#
# Prerequisites — set as CI/CD Variables (Settings → CI/CD → Variables):
#
#   KUBECONFIG_FILE             File-type kubeconfig variable (must be set as File type)
#   K8S_NAMESPACE               target namespace (e.g. edc-connector)
#   CONNECTOR_ID                unique connector instance identifier
#   DOMAIN_BASE                 base domain for public hostnames (e.g. example.org)
#
#   ISSUER_DID                  dataspace issuer DID  (e.g. did:web:your-dataspace-issuer)
#   FEDERATED_CATALOG_ADDR      federated catalog URL (e.g. https://federated-catalog.your-dataspace.org)
#   DATA_SPACE_HUB_ADDR         data-space-hub URL    (e.g. https://data-space-hub.your-dataspace.org)
#   CATALOG_API_KEY             catalog API key (can be empty)
#   DSH_API_KEY                 data-space-hub API key (can be empty)
#
#   ENABLE_IDENTITY_HUB         true/false (default: false)
#   ENABLE_STORAGE              true/false (default: true)
#
#   --- Keycloak selection ---
#   KEYCLOAK_FLAVOR             "sage" (default) or "psnc" — which Keycloak to deploy/configure
#                               sage: RCIAM/iShare "sage" Keycloak (keycloak-sage/)
#                               psnc: the native Keycloak bundled with psnc-edc-mvds
#
#   --- SAGE Keycloak options (used only when KEYCLOAK_FLAVOR=sage) ---
#   SATELLITE_ID                iShare satellite id      (e.g: EU.EORI.PL12345678)
#   SATELLITE_URL               iShare satellite URL     (e.g.: https://pr-middleware.62.3.175.232.nip.io/v2.0.1)
#   SAGE_KC_ADMIN               bootstrap admin username
#   SAGE_KC_ADMIN_PASSWORD      bootstrap admin password
#   ISHARE_CA_PEM               File-type CI variable containing the iShare CA certificate chain (PEM). Mounted into Keycloak at /opt/keycloak-keys/sage/ca-file.pem
#
#   --- Secrets — generate with: openssl rand -base64 32 | tr -d '\n' ---
#   CONNECTOR_DB_PASSWORD
#   KEYCLOAK_DB_PASSWORD        (KEYCLOAK_FLAVOR=psnc only) password for the native Keycloak's Postgres DB
#   KEYCLOAK_ADMIN_PASSWORD     (KEYCLOAK_FLAVOR=psnc only) bootstrap admin password for the native Keycloak (admin user "admin"). For KEYCLOAK_FLAVOR=sage, use SAGE_KC_ADMIN / SAGE_KC_ADMIN_PASSWORD instead.
#   IDENTITY_HUB_DB_PASSWORD
#   API_AUTH_KEY
#   RUSTFS_ACCESS_KEY
#   RUSTFS_SECRET_KEY
#   IH_API_SUPERUSER_KEY        format: base64(user).base64(secret) — Generate with: IH_USER="super-user"; IH_SECRET="$(openssl rand -base64 32 | tr -d '\r\n')"; printf '%s.%s\n' "$(printf '%s' "$IH_USER" | openssl base64 -A)" "$(printf '%s' "$IH_SECRET" | openssl base64 -A)"
#
#   --- Optional settings
#   STS_CLIENT_SECRET (optional) Vault alias name for the STS client secret — used as the KEY in Vault, NOT the secret value itself.
#                     The actual secret is generated and stored by init:dataspace. Keep this short and stable (e.g. "sts-client-secret").
#                     Default: "sts-client-secret"
#
#   Optional Docker Hub credentials for pulling images (if not public):
#   DOCKERHUB_USER              Docker Hub username  (for image pull secret)
#   DOCKERHUB_TOKEN             Docker Hub access token
#   DOCKERHUB_EMAIL             Docker Hub email


###############################################################################

variables:
  # KUBECONFIG_FILE aliased to CONFIG for internal use
  CONFIG: $KUBECONFIG_RESEARCH

  IMAGE_TAG: "latest"
  ENABLE_IDENTITY_HUB: "true"       # Identity Hub component for data space integration (optional)
  ENABLE_STORAGE: "true"            # RustFS-based storage service for EDC (optional, but recommended for real workloads)
  ANSIBLE_FORCE_COLOR: "true"       # Force color output in Ansible logs for better readability

  # ---- Keycloak selection: "sage" (RCIAM/iShare) or "psnc" (native psnc-edc-mvds) ----
  KEYCLOAK_FLAVOR: "sage"

  # Upstream repo containing the deployment playbooks
  EDC_REPO_URL: "https://gitlab.pcss.pl/daisd-public/dpi-pipelines/psnc-edc-mvds/psnc-edc-mvds.git"
  EDC_REPO_REF: "develop"
  # Path inside the cloned repo where the K8s instructions live
  WORK_DIR: /app/edc-mvds/deployment/instruction/kubernetes

  # ---- public hostnames ----
  CONNECTOR_HOST: "${CONNECTOR_ID}.edc.${DOMAIN_BASE}"
  DASHBOARD_HOST: "${CONNECTOR_ID}.edc-dashboard.${DOMAIN_BASE}"
  KEYCLOAK_HOST: "${CONNECTOR_ID}.edc-keycloak.${DOMAIN_BASE}"
  IDENTITY_HUB_HOST: "${CONNECTOR_ID}.edc-identity.${DOMAIN_BASE}"
  STORAGE_HOST: "${CONNECTOR_ID}.edc-storage.${DOMAIN_BASE}"
  CONSUMER_BACKEND_HOST: "${CONNECTOR_ID}.edc-consumer.${DOMAIN_BASE}"
  KEYVAULT_HOST: "${CONNECTOR_ID}.edc-vault.${DOMAIN_BASE}"

  # ---- PVC sizes (optional — Set these as CI/CD variables to override — Unset means PSNC upstream defaults apply) ----
  CONNECTOR_DB_STORAGE_SIZE: "1Gi"     # PSNC default: 5Gi
  KEYCLOAK_DB_STORAGE_SIZE: "1Gi"      # PSNC default: 5Gi
  IDENTITY_HUB_DB_STORAGE_SIZE: "1Gi"  # PSNC default: 5Gi
  VAULT_PVC_STORAGE_SIZE: "1Gi"        # PSNC default: 1Gi
  STORAGE_PVC_SIZE: "2Gi"              # PSNC default: 10Gi

stages:
  - prepare
  - deploy-infra
  - deploy-services
  - configure
  - verify
  - cleanup

# ---------------------------------------------------------------------------
# Workflow rules — pipeline only runs when triggered manually via the UI/API
# ---------------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

# ---------------------------------------------------------------------------
# Reusable hidden job — clones upstream, installs tooling, renders config
# ---------------------------------------------------------------------------
.deploy_base:
  image: python:3.12-alpine
  retry: 1
  before_script:
    # ---- system packages ----
    - apk add --no-cache bash curl git make openssl jq gettext

    # ---- clone the upstream application repository ----
    - git clone --depth 1 --branch "${EDC_REPO_REF}" "${EDC_REPO_URL}" /app/edc-mvds

    # ---- python tooling ----
    - pip install --no-cache-dir ansible kubernetes python-keycloak requests
    - ansible-galaxy collection install kubernetes.core

    # ---- kubectl ----
    - |
      KUBECTL_VERSION="v1.34.0"
      curl -Lo /usr/local/bin/kubectl \
        "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
      chmod +x /usr/local/bin/kubectl

    # ---- kubeconfig ----
    - mkdir -p ~/.kube
    - '[ -f "$CONFIG" ] || { echo "ERROR: CONFIG file not found (is KUBECONFIG set as a File variable at group level?)"; exit 1; }'
    - cp $CONFIG ~/.kube/config
    - chmod 600 ~/.kube/config
    - kubectl version

    # ---- enter working directory ----
    - cd "${WORK_DIR}"

    # ---- select Keycloak flavor (sage | psnc) ----
    # sage -> upstream Keycloak disabled; SAGE Keycloak deployed by deploy:sage-keycloak
    # psnc -> native psnc-edc-mvds Keycloak deployed by the upstream playbooks
    - |
      if [ "${KEYCLOAK_FLAVOR:-sage}" = "psnc" ]; then
        IDP_ENABLED=true
        KC_BOOT_ADMIN="admin"
        KC_BOOT_PW="${KEYCLOAK_ADMIN_PASSWORD:-change-me}"
      else
        IDP_ENABLED=false
        KC_BOOT_ADMIN="${SAGE_KC_ADMIN}"
        KC_BOOT_PW="${SAGE_KC_ADMIN_PASSWORD}"
      fi
      export IDP_ENABLED KC_BOOT_ADMIN KC_BOOT_PW

    # ---- render overrides ----
    - |
      cat > vars/overrides.yaml <<EOF
      ---
      k8s_namespace: "${K8S_NAMESPACE}"
      kubeconfig_path: "~/.kube/config"

      image_tag: "${IMAGE_TAG}"
      image_pull_secret_name: "${DOCKERHUB_USER:+dockerhub-creds}"
      image_pull_policy: "Always"

      enable_identity_provider: ${IDP_ENABLED}   # psnc flavor -> true (native Keycloak); sage flavor -> false (SAGE Keycloak deployed separately)
      enable_identity_hub: ${ENABLE_IDENTITY_HUB}
      enable_storage: ${ENABLE_STORAGE}
      enable_vault: true

      public_scheme: "https"
      connector_host: "${CONNECTOR_HOST}"
      dashboard_host: "${DASHBOARD_HOST}"
      keycloak_host: "${KEYCLOAK_HOST:-keycloak.example.org}"
      identity_hub_host: "${IDENTITY_HUB_HOST:-identity-hub.example.org}"
      storage_host: "${STORAGE_HOST:-storage.example.org}"
      consumer_backend_host: "${CONSUMER_BACKEND_HOST:-consumer-backend.example.org}"
      keyvault_host: "${KEYVAULT_HOST:-vault.example.org}"

      connector_id: "${CONNECTOR_ID}"
      connector_auth_key: "${API_AUTH_KEY}"
      sts_client_secret: "${STS_CLIENT_SECRET:-sts-client-secret}"

      issuer_did: "${ISSUER_DID}"
      federated_catalog_address: "${FEDERATED_CATALOG_ADDR}"
      data_space_hub_address: "${DATA_SPACE_HUB_ADDR}"
      catalog_api_key: "${CATALOG_API_KEY:-}"
      dsh_api_key: "${DSH_API_KEY:-}"

      # ---- resource limits (required by cluster ResourceQuota) ----
      vault_resources:
        requests: { cpu: "100m", memory: "256Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }
      EOF

    # ---- optional PVC size overrides (only written when CI variable is set) ----
    - |
      [ -n "${CONNECTOR_DB_STORAGE_SIZE:-}" ]    && echo "connector_db_storage_size: \"${CONNECTOR_DB_STORAGE_SIZE}\""       >> vars/overrides.yaml || true
      [ -n "${KEYCLOAK_DB_STORAGE_SIZE:-}" ]     && echo "keycloak_db_storage_size: \"${KEYCLOAK_DB_STORAGE_SIZE}\""         >> vars/overrides.yaml || true
      [ -n "${IDENTITY_HUB_DB_STORAGE_SIZE:-}" ] && echo "identity_hub_db_storage_size: \"${IDENTITY_HUB_DB_STORAGE_SIZE}\"" >> vars/overrides.yaml || true
      [ -n "${VAULT_PVC_STORAGE_SIZE:-}" ]       && echo "vault_pvc_storage_size: \"${VAULT_PVC_STORAGE_SIZE}\""             >> vars/overrides.yaml || true
      [ -n "${STORAGE_PVC_SIZE:-}" ]             && echo "storage_pvc_size: \"${STORAGE_PVC_SIZE}\""                         >> vars/overrides.yaml || true

    # ---- patch upstream templates for strict cluster policies ----
    # Cluster enforces: ResourceQuota (limits.memory) + PodSecurity (runAsNonRoot).
    # Also suppresses OpenShift-only tasks (Routes) that fail on plain Kubernetes.
    - |
      python3 - <<'PYEOF'
      import os

      def ind(text, n):
          """Add n spaces of indentation to every line."""
          p = " " * n
          return "\n".join(p + l for l in text.splitlines())

      def patch(path, marker, target, content):
          if not os.path.isfile(path):
              return
          text = open(path).read()
          if marker in text:
              print(f"  SKIP {path}")
              return
          if target not in text:
              print(f"  WARN {path}: target not found: {target!r}")
              return
          text = text.replace(target, content + "\n" + target)
          open(path, "w").write(text)
          print(f"  OK   {path}")

      def replace(path, old, new):
          if not os.path.isfile(path):
              return
          text = open(path).read()
          if old not in text:
              print(f"  WARN {path}: old text not found")
              return
          open(path, "w").write(text.replace(old, new))
          print(f"  OK   {path}")

      # --- Postgres: pod securityContext (6-space indent) ---
      PG_SEC = ind("securityContext:\n  fsGroup: 1001\n  runAsUser: 1001", 6)
      # --- Postgres: container resources (10-space indent) ---
      PG_RES = ind("resources:\n  requests:\n    cpu: \"100m\"\n    memory: \"256Mi\"\n  limits:\n    cpu: \"500m\"\n    memory: \"512Mi\"", 10)

      print("== Patching Postgres templates ==")
      for tpl in [
          "templates/connector/connector-postgres.yaml.j2",
          "templates/keycloak/keycloak-postgres.yaml.j2",
          "templates/identity-hub/identity-hub-postgres.yaml.j2",
      ]:
          patch(tpl, "fsGroup: 1001",
                "{% if image_pull_secret_name", PG_SEC)
          patch(tpl, 'cpu: "100m"',
                "          volumeMounts:", PG_RES)

      # --- Vault: pod securityContext (6-space indent) ---
      print("== Patching Vault template ==")
      V = "templates/vault/vault.yaml.j2"
      V_POD_SEC = ind("securityContext:\n  fsGroup: 100\n  runAsUser: 100", 6)
      patch(V, "fsGroup: 100", "      serviceAccountName:", V_POD_SEC)
      # container securityContext: add runAsUser: 100
      OLD_SEC = ind("securityContext:\n  readOnlyRootFilesystem: false\n  runAsNonRoot: true", 10)
      NEW_SEC = OLD_SEC + "\n" + ind("runAsUser: 100", 12)
      replace(V, OLD_SEC, NEW_SEC)

      # --- Storage: fix podSecurityContext typo ---
      print("== Patching Storage template ==")
      replace("templates/storage/storage-deployment.yaml.j2",
              ind("podSecurityContext:", 6), ind("securityContext:", 6))

      # --- deploy-vault.yaml: suppress OpenShift Route task (not available on plain K8s) ---
      # The vault-route task is redundant — we expose Vault via our own gateway.yaml instead.
      print("== Patching deploy-vault.yaml ==")
      replace("deploy-vault.yaml",
              "      when: enable_identity_hub | bool",
              "      when: false  # suppressed: OpenShift Route not available on plain Kubernetes")

      # --- Connector configmap: expand EDC_TRUSTED_ISSUERS to include ISSUER_DID (the upstream template hardcodes a PSNC hub DID) ---
      print("== Patching connector-configmap trusted issuers ==")
      CONFIGMAP = "templates/connector/connector-configmap.yaml.j2"
      PSNC_HUB = "did:web:data-space-hub-ceads-data-space.apps.bst2.paas.psnc.pl"
      issuer_did = os.environ.get("ISSUER_DID", "").strip()
      if issuer_did and issuer_did != PSNC_HUB:
          print(f"  adding ISSUER_DID to trusted issuers: {issuer_did}")
          replace(CONFIGMAP,
              f"EDC_TRUSTED_ISSUERS: '{{{{ [\"{PSNC_HUB}\"] | to_json }}}}'",
              f"EDC_TRUSTED_ISSUERS: '{{{{ [\"{PSNC_HUB}\", \"{issuer_did}\"] | to_json }}}}'")
      else:
          print("  ISSUER_DID not set or matches PSNC hub — skipping trusted issuers patch")

      # --- Repoint Keycloak realm 'Organizations' -> 'sage' (SAGE Keycloak only) ---
      if os.environ.get("KEYCLOAK_FLAVOR", "sage") == "sage":
          print("== Repointing Keycloak realm Organizations -> sage ==")
          replace("templates/connector/connector-configmap.yaml.j2",
                  "/realms/Organizations/protocol/openid-connect/certs",
                  "/realms/sage/protocol/openid-connect/certs")
          replace("templates/dashboard/dashboard-configmap.yaml.j2",
                  "/realms/Organizations",
                  "/realms/sage")
          replace("templates/env/dotenv.j2",
                  "REALM_NAME={{ 'Organizations' | to_json }}",
                  "REALM_NAME={{ 'sage' | to_json }}")
      else:
          print("== KEYCLOAK_FLAVOR=psnc: keeping realm 'Organizations' ==")
      PYEOF

    - |
      cat > vars/secrets.yaml <<EOSEC
      ---
      secrets:
        connector_db:
          postgres_user: "connector"
          postgres_password: "${CONNECTOR_DB_PASSWORD}"
          postgres_db: "edc_connector_db"

        connector:
          datasource_default_url: "jdbc:postgresql://edc-connector-connector-db:5432/edc_connector_db"
          datasource_default_user: "connector"
          datasource_default_password: "${CONNECTOR_DB_PASSWORD}"
          vault_hashicorp_token: "leave-for-template"
          api_auth_key: "${API_AUTH_KEY}"
          web_http_auth_key: "${API_AUTH_KEY}"
          web_http_management_auth_key: "${API_AUTH_KEY}"
          web_http_control_auth_key: "${API_AUTH_KEY}"
          web_http_catalogproxy_auth_key: "${API_AUTH_KEY}"

        keycloak_db:
          postgres_user: "keycloak"
          postgres_password: "${KEYCLOAK_DB_PASSWORD:-change-me}"
          postgres_db: "keycloak"

        keycloak:
          admin: "${KC_BOOT_ADMIN}"
          admin_password: "${KC_BOOT_PW}"
          db: "postgres"
          db_schema: "public"
          db_url: "edc-connector-keycloak-db"
          db_username: "keycloak"
          db_password: "${KEYCLOAK_DB_PASSWORD:-change-me}"

        identity_hub_db:
          postgres_user: "edc"
          postgres_password: "${IDENTITY_HUB_DB_PASSWORD:-change-me}"
          postgres_db: "edc"

        identity_hub:
          vault_hashicorp_token: "leave-for-template"
          ih_api_superuser_key: "${IH_API_SUPERUSER_KEY:-change-me}"
          datasource_default_user: "edc"
          datasource_default_password: "${IDENTITY_HUB_DB_PASSWORD:-change-me}"

        storage:
          rustfs_access_key: "${RUSTFS_ACCESS_KEY:-change-me}"
          rustfs_secret_key: "${RUSTFS_SECRET_KEY:-change-me}"

        consumer_backend:
          s3_access_key: "${RUSTFS_ACCESS_KEY:-change-me}"
          s3_secret_key: "${RUSTFS_SECRET_KEY:-change-me}"
      EOSEC

# ---------------------------------------------------------------------------
# Stage: prepare — Docker Hub image-pull secret (optional)
# ---------------------------------------------------------------------------
prepare:namespace:
  image: dtzar/helm-kubectl:3.11.3
  stage: prepare
  before_script:
    - mkdir -p ~/.kube
    - '[ -f "$CONFIG" ] || { echo "ERROR: CONFIG file not found (is KUBECONFIG set as a File variable at group level?)"; exit 1; }'
    - cp $CONFIG ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - |
      if [ -n "${DOCKERHUB_USER:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
        kubectl -n "${K8S_NAMESPACE}" create secret docker-registry dockerhub-creds \
          --docker-server=https://index.docker.io/v1/ \
          --docker-username="${DOCKERHUB_USER}" \
          --docker-password="${DOCKERHUB_TOKEN}" \
          --docker-email="${DOCKERHUB_EMAIL:-ci@example.com}" \
          --dry-run=client -o yaml | kubectl apply -f -
      else
        echo "No DOCKERHUB_USER/TOKEN set, skipping image pull secret."
      fi

# ---------------------------------------------------------------------------
# Stage: deploy-infra — env rendering, K8s secrets, databases, vault
# ---------------------------------------------------------------------------
deploy:env:
  extends: .deploy_base
  stage: deploy-infra
  script:
    - cd "${WORK_DIR}"
    - ansible-playbook -e @vars/overrides.yaml deploy-env.yaml
  needs:
    - prepare:namespace

deploy:secrets:
  extends: .deploy_base
  stage: deploy-infra
  script:
    - cd "${WORK_DIR}"
    - ansible-playbook -e @vars/overrides.yaml deploy-secrets.yaml
  needs:
    - deploy:env

deploy:databases:
  extends: .deploy_base
  stage: deploy-infra
  script:
    - cd "${WORK_DIR}"
    - ansible-playbook -e @vars/overrides.yaml deploy-databases.yaml
  needs:
    - deploy:secrets

deploy:vault:
  extends: .deploy_base
  stage: deploy-infra
  script:
    - cd "${WORK_DIR}"
    - ansible-playbook -e @vars/overrides.yaml deploy-vault.yaml
  needs:
    - deploy:secrets

# ---------------------------------------------------------------------------
# deploy:sage-keycloak — RCIAM/iShare SAGE Keycloak
# ---------------------------------------------------------------------------
deploy:sage-keycloak:
  image: dtzar/helm-kubectl:3.11.3
  stage: deploy-infra
  before_script:
    - apk add --no-cache gettext
    - mkdir -p ~/.kube
    - '[ -f "$CONFIG" ] || { echo "ERROR: CONFIG file not found"; exit 1; }'
    - cp "$CONFIG" ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - set -eu
    - cd "${CI_PROJECT_DIR}"
    - export NAMESPACE="${K8S_NAMESPACE}"
    - export PUBLIC_SCHEME="https"
    - export KEYCLOAK_HOST="${KEYCLOAK_HOST:-keycloak.example.org}"
    - export SATELLITE_ID SATELLITE_URL SAGE_KC_ADMIN SAGE_KC_ADMIN_PASSWORD

    - echo "=== Realm import ConfigMap ==="
    - |
      kubectl -n "${NAMESPACE}" create configmap sage-keycloak-realm \
        --from-file=sage-realm.json=keycloak-sage/realms/sage-realm.json \
        --dry-run=client -o yaml | kubectl apply -f -
    - kubectl -n "${NAMESPACE}" label configmap sage-keycloak-realm app=edc-connector --overwrite

    - echo "=== Entitlements init.sh ConfigMap ==="
    - |
      kubectl -n "${NAMESPACE}" create configmap sage-keycloak-init \
        --from-file=init.sh=keycloak-sage/init.sh \
        --dry-run=client -o yaml | kubectl apply -f -
    - kubectl -n "${NAMESPACE}" label configmap sage-keycloak-init app=edc-connector --overwrite

    - echo "=== iShare CA Secret ==="
    - |
      if [ -z "${ISHARE_CA_PEM:-}" ]; then
        echo "ERROR: ISHARE_CA_PEM is not set (provide the iShare CA chain as a File-type CI variable)"; exit 1
      fi
      if [ -f "${ISHARE_CA_PEM}" ]; then
        CA_SRC="${ISHARE_CA_PEM}"
      else
        printf '%s' "${ISHARE_CA_PEM}" > /tmp/ca-file.pem; CA_SRC=/tmp/ca-file.pem
      fi
      kubectl -n "${NAMESPACE}" create secret generic sage-keycloak-ca \
        --from-file=ca-file.pem="${CA_SRC}" \
        --dry-run=client -o yaml | kubectl apply -f -
    - kubectl -n "${NAMESPACE}" label secret sage-keycloak-ca app=edc-connector --overwrite

    - echo "=== SAGE Postgres ==="
    - envsubst '${NAMESPACE}' < keycloak-sage/k8s/sage-postgres.yaml | kubectl apply -f -

    - echo "=== SAGE Keycloak ==="
    - envsubst '${NAMESPACE} ${PUBLIC_SCHEME} ${KEYCLOAK_HOST} ${SATELLITE_ID} ${SATELLITE_URL} ${SAGE_KC_ADMIN} ${SAGE_KC_ADMIN_PASSWORD}' < keycloak-sage/k8s/sage-keycloak.yaml | kubectl apply -f -
  needs:
    - deploy:env
  rules:
    - if: '$KEYCLOAK_FLAVOR == "sage"'

# ---------------------------------------------------------------------------
# Stage: deploy-services — workloads + ingress / routes
# ---------------------------------------------------------------------------
deploy:services:
  extends: .deploy_base
  stage: deploy-services
  script:
    - cd "${WORK_DIR}"
    - ansible-playbook -e @vars/overrides.yaml deploy-stateless-services.yaml
  needs:
    - deploy:databases
    - deploy:vault

deploy:gateways:
  extends: .deploy_base
  stage: deploy-services
  script:
    - cd "${CI_PROJECT_DIR}"
    - export NAMESPACE="${K8S_NAMESPACE}"
    - export KEYCLOAK_HOST="${KEYCLOAK_HOST:-keycloak.example.org}"
    - export IDENTITY_HUB_HOST="${IDENTITY_HUB_HOST:-identity-hub.example.org}"
    - export KEYVAULT_HOST="${KEYVAULT_HOST:-vault.example.org}"
    - export STORAGE_HOST="${STORAGE_HOST:-storage.example.org}"
    - export CONSUMER_BACKEND_HOST="${CONSUMER_BACKEND_HOST:-consumer-backend.example.org}"
    - envsubst < gateway.yaml | kubectl apply -f -
  needs:
    - deploy:services

# ---------------------------------------------------------------------------
# Stage: configure — vault init/unseal, keycloak bootstrap, dataspace init
# ---------------------------------------------------------------------------
init:vault:
  extends: .deploy_base
  stage: configure
  script:
    - cd "${WORK_DIR}"
    - |
      mkdir -p secrets
      if kubectl -n "${K8S_NAMESPACE}" get secret vault-pipeline-credentials >/dev/null 2>&1; then
        kubectl -n "${K8S_NAMESPACE}" get secret vault-pipeline-credentials -o json \
          | jq -r '.data | to_entries[] | "\(.key)=\(.value | @base64d)"' \
          > secrets/vault.secrets
        echo "Restored Vault credentials from vault-pipeline-credentials secret"
      else
        echo "No vault-pipeline-credentials secret found — Vault will be initialized fresh"
      fi
    - make deploy-env ANSIBLE_ARGS="-e @vars/overrides.yaml"
    - echo "Waiting for Vault pod to be ready..."
    - kubectl -n "${K8S_NAMESPACE}" rollout status statefulset/edc-connector-vault-${CONNECTOR_ID}-ih --timeout=300s
   
    - make init-vault

    # Persist credentials to the cluster so they survive the next pipeline run.
    - |
      if [ -s secrets/vault.secrets ]; then
        kubectl -n "${K8S_NAMESPACE}" create secret generic vault-pipeline-credentials \
          --from-env-file=secrets/vault.secrets \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "Vault credentials persisted to vault-pipeline-credentials secret"
      fi
  allow_failure: true
  needs:
    - deploy:vault
    - deploy:env

configure:keycloak:
  extends: .deploy_base
  stage: configure
  script:
    - cd "${WORK_DIR}"
    - make deploy-env ANSIBLE_ARGS="-e @vars/overrides.yaml"
    - echo "Waiting for Keycloak deployment to be ready..."
    - kubectl -n "${K8S_NAMESPACE}" rollout status deployment/edc-connector-keycloak --timeout=300s
    - |
      if [ "${KEYCLOAK_FLAVOR:-sage}" = "psnc" ]; then KC_REALM=Organizations; else KC_REALM=sage; fi
      echo "Keycloak flavor: ${KEYCLOAK_FLAVOR:-sage} — waiting for realm '${KC_REALM}'..."
      KC_WELL_KNOWN="https://${KEYCLOAK_HOST}/realms/${KC_REALM}/.well-known/openid-configuration"
      i=0
      until [ "$(curl -s -o /dev/null -w '%{http_code}' "$KC_WELL_KNOWN")" = "200" ]; do
        i=$((i+1)); [ "$i" -ge 60 ] && { echo "ERROR: '${KC_REALM}' realm not ready after timeout"; exit 1; }
        printf '.'; sleep 5
      done
      echo " '${KC_REALM}' realm is ready"
  
    # Restart the dashboard so it picks up the current app.config.json.
    - kubectl -n "${K8S_NAMESPACE}" rollout restart deployment/edc-connector-dashboard || true
    - kubectl -n "${K8S_NAMESPACE}" rollout status deployment/edc-connector-dashboard --timeout=180s || true

    # Bootstrap the EDC clients/roles/groups/user into the selected realm (REALM_NAME and bootstrap admin creds are wired via the rendered dotenv).
    - make configure-keycloak

    # SAGE only: RCIAM AGM member-user-attribute configuration (entitlements job).
    - |
      if [ "${KEYCLOAK_FLAVOR:-sage}" = "sage" ]; then
        cd "${CI_PROJECT_DIR}"
        export NAMESPACE="${K8S_NAMESPACE}"
        export SAGE_KC_ADMIN SAGE_KC_ADMIN_PASSWORD
        kubectl -n "${NAMESPACE}" delete job edc-connector-sage-entitlements --ignore-not-found
        envsubst '${NAMESPACE} ${SAGE_KC_ADMIN} ${SAGE_KC_ADMIN_PASSWORD}' < keycloak-sage/k8s/sage-entitlements-job.yaml | kubectl apply -f -
        kubectl -n "${NAMESPACE}" wait --for=condition=complete job/edc-connector-sage-entitlements --timeout=300s
      else
        echo "KEYCLOAK_FLAVOR=psnc — skipping SAGE entitlements job"
      fi
  needs:
    - job: deploy:sage-keycloak
      optional: true
    - deploy:services
    - deploy:gateways
  rules:
    - if: '$KEYCLOAK_FLAVOR == "sage"'
    - if: '$KEYCLOAK_FLAVOR == "psnc"'

init:dataspace:
  extends: .deploy_base
  stage: configure
  script:
    - cd "${WORK_DIR}"
    - make deploy-env ANSIBLE_ARGS="-e @vars/overrides.yaml"
    - make init-identity-hub
  needs:
#    - job: init:vault
#      optional: true
    - job: configure:keycloak
      optional: true
    - deploy:gateways
  rules:
    - if: '$ENABLE_IDENTITY_HUB == "true"'

# ---------------------------------------------------------------------------
# configure:jsonld-contexts
#
# NOTE: Only needed for TSG integration. If you are not using TSG, you can safely skip this job.
#
# EDC's Titanium JSON-LD loader refuses to fetch remote (https://) contexts.
# When a TSG counter-party POSTs a DSP message, it includes its TSG-specific
# contexts (tsg.json, health.json) which EDC cannot resolve, causing the
# request to fail with HTTP 400 + "LOADING_REMOTE_CONTEXT_FAILED".
#
# This job pre-loads the TSG contexts into the EDC connector pod:
#   1. Fetches the JSON-LD files (from public URL or the tno-security-gateway repo).
#   2. Stores them in a ConfigMap (one key per file).
#   3. Patches the connector Deployment to mount the ConfigMap at /etc/edc/contexts.
#   4. Registers each context via EDC_JSONLD_DOCUMENT_<ALIAS>_PATH/_URL env vars.
#   5. Triggers a rollout restart and waits for it.
#
# Variables (override via CI/CD Variables to pin a different TSG version):
#   TSG_CONTEXTS_VERSION  TSG contexts version path component (default: "v0.19.0")
#   TSG_CONTEXTS_BASE     Base URL for the contexts            (default: https://tsg.dataspac.es/contexts)
# ---------------------------------------------------------------------------
configure:jsonld-contexts:
  image: dtzar/helm-kubectl:3.11.3
  stage: configure
  variables:
    TSG_CONTEXTS_VERSION: "v0.19.0"
    TSG_CONTEXTS_BASE: "https://tsg.dataspac.es/contexts"
  before_script:
    - apk add --no-cache curl
    - mkdir -p ~/.kube
    - '[ -f "$CONFIG" ] || { echo "ERROR: CONFIG file not found"; exit 1; }'
    - cp "$CONFIG" ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - set -eu
    - NS="${K8S_NAMESPACE}"
    - DEPLOY="edc-connector-connector"
    - CM_NAME="edc-jsonld-contexts"
    - MOUNT_PATH="/etc/edc/contexts"
    - TSG_URL="${TSG_CONTEXTS_BASE}/${TSG_CONTEXTS_VERSION}/tsg.json"
    - HEALTH_URL="${TSG_CONTEXTS_BASE}/${TSG_CONTEXTS_VERSION}/health.json"
    - DSP_URL="https://w3id.org/dspace/2025/1/context.jsonld"

    - echo "=== Fetching JSON-LD contexts ==="
    - mkdir -p contexts
    - curl -fsSL -o contexts/tsg.json    "${TSG_URL}"
    - curl -fsSL -o contexts/health.json "${HEALTH_URL}"
    - curl -fsSL -o contexts/dsp.json    "${DSP_URL}"
    - ls -la contexts

    - echo "=== Creating/updating ConfigMap ${CM_NAME} ==="
    - |
      kubectl -n "${NS}" create configmap "${CM_NAME}" \
        --from-file=tsg.json=contexts/tsg.json \
        --from-file=health.json=contexts/health.json \
        --from-file=dsp.json=contexts/dsp.json \
        --dry-run=client -o yaml | kubectl apply -f -

    - echo "=== Patching deployment ${DEPLOY} - volume + volumeMount ==="
    - |
      kubectl -n "${NS}" patch deployment "${DEPLOY}" --type=json -p="$(cat <<JSON
      [
        {
          "op": "add",
          "path": "/spec/template/spec/volumes/-",
          "value": {
            "name": "jsonld-contexts",
            "configMap": { "name": "${CM_NAME}" }
          }
        },
        {
          "op": "add",
          "path": "/spec/template/spec/containers/0/volumeMounts/-",
          "value": {
            "name": "jsonld-contexts",
            "mountPath": "${MOUNT_PATH}",
            "readOnly": true
          }
        }
      ]
      JSON
      )" || echo "  (volume/volumeMount may already be present — continuing)"

    - echo "=== Setting EDC_JSONLD_DOCUMENT_* env vars on ${DEPLOY} ==="
    - |
      kubectl -n "${NS}" set env deployment/"${DEPLOY}" \
        EDC_JSONLD_HTTPS_ENABLED=false \
        EDC_JSONLD_DOCUMENT_TSG_URL="${TSG_URL}" \
        EDC_JSONLD_DOCUMENT_TSG_PATH="${MOUNT_PATH}/tsg.json" \
        EDC_JSONLD_DOCUMENT_HEALTH_URL="${HEALTH_URL}" \
        EDC_JSONLD_DOCUMENT_HEALTH_PATH="${MOUNT_PATH}/health.json" \
        EDC_JSONLD_DOCUMENT_DSP2025_URL="${DSP_URL}" \
        EDC_JSONLD_DOCUMENT_DSP2025_PATH="${MOUNT_PATH}/dsp.json"

    - echo "=== Waiting for rollout to complete ==="
    - kubectl -n "${NS}" rollout status deployment/"${DEPLOY}" --timeout=300s
    - echo "=== JSON-LD contexts configured ==="
  needs:
    - deploy:services
  rules:
    - when: on_success
  allow_failure: true

# ---------------------------------------------------------------------------
# Stage: verify — smoke tests and resource listing
# ---------------------------------------------------------------------------
verify:dataspace:
  extends: .deploy_base
  stage: verify
  script:
    - cd "${WORK_DIR}"
    - make deploy-env ANSIBLE_ARGS="-e @vars/overrides.yaml"
    - make verify-identity-hub VERIFY_VERBOSE=true
  needs:
    - init:dataspace
  rules:
    - if: '$ENABLE_IDENTITY_HUB == "true"'
  allow_failure: true

verify:resources:
  extends: .deploy_base
  stage: verify
  script:
    - cd "${WORK_DIR}"
    - kubectl -n "${K8S_NAMESPACE}" get deploy,svc,ingress
    - kubectl -n "${K8S_NAMESPACE}" get pods -o wide
  needs:
    - deploy:gateways
  allow_failure: true

# ---------------------------------------------------------------------------
# Stage: cleanup — manual teardown of all EDC resources
# ---------------------------------------------------------------------------
cleanup:edc:
  image: dtzar/helm-kubectl:3.11.3
  stage: cleanup
  variables:
    GATEWAY_CRD: "gateway.geodan.nl"  # Geodan gateway CRD name — override if your cluster uses a different CRD
  before_script:
    - mkdir -p ~/.kube
    - '[ -f "$CONFIG" ] || { echo "ERROR: CONFIG file not found"; exit 1; }'
    - cp $CONFIG ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - NS="${K8S_NAMESPACE}"
    - APP="edc-connector"
    - echo "=== Removing all EDC resources from namespace ${NS} ==="
    - |
      kubectl -n "${NS}" delete "${GATEWAY_CRD}" \
        ${CONNECTOR_ID}-connector \
        ${CONNECTOR_ID}-dashboard \
        ${CONNECTOR_ID}-keycloak \
        ${CONNECTOR_ID}-identity-hub \
        ${CONNECTOR_ID}-vault \
        ${CONNECTOR_ID}-storage \
        ${CONNECTOR_ID}-consumer-backend \
        --ignore-not-found
    # Deployments
    - kubectl -n "${NS}" delete deploy -l app="${APP}" --ignore-not-found
    # StatefulSets (databases + vault)
    - kubectl -n "${NS}" delete statefulset -l app="${APP}" --ignore-not-found
    # Services
    - kubectl -n "${NS}" delete svc -l app="${APP}" --ignore-not-found
    # ConfigMaps
    - kubectl -n "${NS}" delete configmap -l app="${APP}" --ignore-not-found
    # Secrets (app-managed only)
    - kubectl -n "${NS}" delete secret -l app="${APP}" --ignore-not-found
    - kubectl -n "${NS}" delete secret dockerhub-creds vault-pipeline-credentials --ignore-not-found
    - kubectl -n "${NS}" delete configmap edc-jsonld-contexts --ignore-not-found
    # SAGE Keycloak entitlements Job (not covered by the app label selector)
    - kubectl -n "${NS}" delete job edc-connector-sage-entitlements --ignore-not-found
    # PVCs (database + vault data)
    - kubectl -n "${NS}" delete pvc -l app="${APP}" --ignore-not-found
    # ServiceAccounts
    - kubectl -n "${NS}" delete sa -l app="${APP}" --ignore-not-found
    # Summary
    - echo "=== Cleanup complete. All resources of app ${APP} have been removed ==="
  rules:
    - when: manual
  needs: []
  allow_failure: true
